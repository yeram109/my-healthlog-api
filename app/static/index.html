<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>마이 헬스 로그</title>
<link rel="stylesheet" href="/static/css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body data-palette="#2a78d6,#d97706">
  <div id="error-banner"></div>

  <div id="auth-section">
    <h1>마이 헬스 로그</h1>

    <div id="login-view">
      <h2>로그인</h2>
      <form id="login-form" class="auth-form">
        <label>아이디
          <input type="text" name="username" required />
        </label>
        <label>비밀번호
          <input type="password" name="password" required />
        </label>
        <div class="form-actions">
          <button type="submit" class="primary">로그인</button>
          <button class="switch-link" id="show-signup-btn" type="button">계정이 없으신가요? 회원가입</button>
        </div>
      </form>
    </div>

    <div id="signup-view">
      <h2>회원가입</h2>
      <form id="signup-form" class="auth-form">
        <label>아이디
          <input type="text" name="username" required />
        </label>
        <label>비밀번호
          <input type="password" name="password" required />
        </label>
        <div class="form-actions">
          <button type="submit" class="primary">가입하기</button>
          <button class="switch-link" id="show-login-btn" type="button">이미 계정이 있으신가요? 로그인</button>
        </div>
      </form>
    </div>
  </div>

  <div id="app-section">
    <div id="admin-banner" class="admin-banner">관리자 모드 · 전체 사용자 데이터를 보고 있습니다</div>

    <div class="app-header">
      <div class="brand">
        <h1>마이 헬스 로그</h1>
        <span id="current-username"></span>
      </div>
      <div class="header-actions">
        <button id="logout-btn">로그아웃</button>
        <button class="switch-link" id="delete-account-btn">회원탈퇴</button>
      </div>
    </div>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="dashboard" type="button">대시보드</button>
      <button class="tab-btn" data-tab="records" type="button">기록</button>
      <button class="tab-btn" data-tab="goal" type="button">목표</button>
      <button class="tab-btn" data-tab="report" type="button">리포트</button>
      <button class="tab-btn" data-tab="users" type="button" id="tab-btn-users">사용자 관리</button>
    </nav>

    <!-- 대시보드 -->
    <section id="view-dashboard" class="view active">
      <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">오늘 체중</div>
          <div class="kpi-value" id="kpi-weight-value">-</div>
          <div class="kpi-delta" id="kpi-weight-delta"></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">BMI</div>
          <div class="kpi-value" id="kpi-bmi-value">-</div>
          <div class="kpi-delta" id="kpi-bmi-badge"></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">혈압</div>
          <div class="kpi-value" id="kpi-bp-value">-</div>
          <div class="kpi-delta" id="kpi-bp-badge"></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">공복 혈당</div>
          <div class="kpi-value" id="kpi-sugar-value">-</div>
          <div class="kpi-delta" id="kpi-sugar-badge"></div>
        </div>
      </div>

      <div id="dashboard-user-charts">
        <h3>체중 추이 (최근 14일)</h3>
        <div class="chart-wrapper">
          <canvas id="weight-chart" role="img" aria-label="최근 14일 체중 추이 라인 차트"></canvas>
        </div>

        <h3>혈압 추이 (최근 14일)</h3>
        <div class="chart-legend" id="bp-chart-legend"></div>
        <div class="chart-wrapper">
          <canvas id="bp-chart" role="img" aria-label="최근 14일 수축기/이완기 혈압 추이 라인 차트"></canvas>
        </div>
      </div>
    </section>

    <!-- 기록 -->
    <section id="view-records" class="view">
      <div class="target-user-select">
        <label>조회 대상
          <select id="records-target-user"></select>
        </label>
      </div>
      <div class="records-toolbar">
        <h2>기록</h2>
        <button id="toggle-form-btn" class="primary" type="button">새 기록 추가</button>
      </div>

      <div id="record-form-wrapper" style="display:none;">
      <h3 id="form-heading">새 기록 추가</h3>
      <form id="record-form" class="data-form">
        <label class="full">날짜
          <input type="date" name="date" required />
        </label>
        <label>몸무게(kg)
          <input type="number" step="0.1" name="weight" required />
        </label>
        <label>키(cm)
          <input type="number" step="0.1" name="height" required />
        </label>
        <label>수축기 혈압
          <input type="number" name="systolic" required />
        </label>
        <label>이완기 혈압
          <input type="number" name="diastolic" required />
        </label>
        <label>공복 혈당
          <input type="number" name="blood_sugar" required />
        </label>
        <label>걸음 수
          <input type="number" name="steps" value="0" />
        </label>
        <label>수면 시간
          <input type="number" step="0.1" name="sleep_hours" value="0" />
        </label>
        <label class="full">메모
          <input type="text" name="memo" />
        </label>
        <div class="form-actions">
          <button id="submit-btn" type="submit" class="primary">저장</button>
          <button id="cancel-btn" type="button">취소</button>
        </div>
      </form>
      </div>

      <p class="legend-note">걸음 수: 5,000 미만 부족 · 5,000~9,999 적정 · 10,000 이상 우수 &nbsp;|&nbsp; 수면 시간: 7시간 미만 부족 · 7~9시간 적정 · 9시간 초과 과다</p>

      <div id="record-list"></div>
    </section>

    <!-- 목표 -->
    <section id="view-goal" class="view">
      <div class="target-user-select">
        <label>조회 대상
          <select id="goal-target-user"></select>
        </label>
      </div>
      <h2>목표</h2>
      <form id="goal-form" class="data-form">
        <label>목표 체중(kg)
          <input type="number" step="0.1" name="target_weight" required />
        </label>
        <label>목표 수축기 혈압
          <input type="number" name="target_systolic" required />
        </label>
        <label>목표 이완기 혈압
          <input type="number" name="target_diastolic" required />
        </label>
        <div class="form-actions">
          <button type="submit" class="primary">목표 저장</button>
        </div>
      </form>
      <div id="goal-display"></div>
    </section>

    <!-- 리포트 -->
    <section id="view-report" class="view">
      <div class="target-user-select">
        <label>조회 대상
          <select id="report-target-user"></select>
        </label>
      </div>
      <h2>리포트</h2>
      <div class="stat-tile-grid" id="report-stats"></div>
      <h3>일별 걸음 수 (이번 주)</h3>
      <div class="chart-wrapper">
        <canvas id="steps-chart" role="img" aria-label="이번 주 일별 걸음 수 막대 그래프"></canvas>
      </div>
    </section>

    <!-- 사용자 관리 (관리자 전용) -->
    <section id="view-users" class="view">
      <h2>사용자 관리</h2>
      <div id="admin-users-list"></div>
    </section>
  </div>

<script src="/static/js/app.js"></script>
</body>
</html>
